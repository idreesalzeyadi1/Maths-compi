<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiz Battle — MCS</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050f05;--green:#25a825;--green2:#52cc52;
  --gold:#FFD600;--gold2:#ff9500;--border:rgba(37,168,37,0.3);
}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:#fff;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
  background:radial-gradient(ellipse at 50% -10%,#1a5a1a 0%,#050f05 60%);
  overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%2325a825' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}

.wrap{
  display:flex;flex-direction:column;align-items:center;
  gap:20px;max-width:500px;width:100%;
  position:relative;z-index:1;
}

/* ── LOGO ── */
.logo-area{display:flex;flex-direction:column;align-items:center;gap:10px;}
.logo-img{
  width:100px;height:100px;border-radius:50%;object-fit:cover;
  border:4px solid var(--green);
  box-shadow:0 0 0 6px rgba(37,168,37,0.12),0 0 40px rgba(37,168,37,0.5);
  animation:logoPulse 3s infinite;
}
@keyframes logoPulse{
  0%,100%{box-shadow:0 0 0 6px rgba(37,168,37,0.12),0 0 40px rgba(37,168,37,0.4)}
  50%{box-shadow:0 0 0 10px rgba(37,168,37,0.07),0 0 60px rgba(37,168,37,0.7)}
}
.school-name{
  font-family:'Bangers',cursive;font-size:15px;letter-spacing:4px;
  color:var(--green2);text-shadow:0 0 15px rgba(82,204,82,0.5);
  text-align:center;
}

/* ── TITLE ── */
.game-title{
  font-family:'Bangers',cursive;
  font-size:clamp(52px,13vw,90px);
  letter-spacing:5px;text-align:center;
  background:linear-gradient(135deg,#FFD600 0%,#ff9500 40%,#FFD600 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 25px rgba(255,214,0,0.6));
  animation:titleGlow 2s infinite alternate;
  line-height:1;
}
@keyframes titleGlow{
  from{filter:drop-shadow(0 0 20px rgba(255,214,0,0.5))}
  to{filter:drop-shadow(0 0 40px rgba(255,149,0,0.9))}
}
.tagline{
  font-size:12px;color:#3a7a3a;letter-spacing:3px;
  text-transform:uppercase;text-align:center;margin-top:-10px;
}

/* ── CARDS ── */
.cards{display:flex;flex-direction:column;gap:14px;width:100%;}

.choice-card{
  background:linear-gradient(135deg,rgba(13,74,13,0.6),rgba(5,15,5,0.8));
  border:2px solid rgba(37,168,37,0.25);
  border-radius:20px;
  padding:22px 24px;
  display:flex;align-items:center;gap:18px;
  cursor:pointer;
  text-decoration:none;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;overflow:hidden;
}
.choice-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(37,168,37,0.06),transparent);
  opacity:0;transition:opacity 0.2s;
}
.choice-card:hover{
  transform:translateY(-4px);
  border-color:var(--green);
  box-shadow:0 0 30px rgba(37,168,37,0.3),inset 0 0 20px rgba(37,168,37,0.05);
}
.choice-card:hover::before{opacity:1;}

.choice-card.gold-card{
  border-color:rgba(255,214,0,0.25);
  background:linear-gradient(135deg,rgba(255,149,0,0.1),rgba(5,15,5,0.8));
}
.choice-card.gold-card::before{
  background:linear-gradient(135deg,rgba(255,214,0,0.06),transparent);
}
.choice-card.gold-card:hover{
  border-color:var(--gold);
  box-shadow:0 0 30px rgba(255,214,0,0.3),inset 0 0 20px rgba(255,214,0,0.05);
}

.card-icon{
  font-size:44px;flex-shrink:0;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  animation:iconBob 2s infinite alternate ease-in-out;
}
.choice-card.gold-card .card-icon{animation-delay:0.4s;}
@keyframes iconBob{from{transform:translateY(0)}to{transform:translateY(-5px)}}

.card-text{flex:1;}
.card-title{
  font-family:'Bangers',cursive;
  font-size:26px;letter-spacing:2px;
  color:var(--green2);margin-bottom:4px;
}
.choice-card.gold-card .card-title{color:var(--gold);}
.card-desc{font-size:13px;color:#3a7a3a;line-height:1.4;}
.choice-card.gold-card .card-desc{color:#6a5a00;}

.card-arrow{
  font-size:22px;color:rgba(37,168,37,0.4);
  transition:transform 0.2s,color 0.2s;
}
.choice-card:hover .card-arrow{transform:translateX(4px);color:var(--green);}
.choice-card.gold-card .card-arrow{color:rgba(255,214,0,0.4);}
.choice-card.gold-card:hover .card-arrow{color:var(--gold);}

/* ── OR ── */
.or-divider{
  display:flex;align-items:center;gap:12px;width:100%;
}
.or-divider::before,.or-divider::after{
  content:'';flex:1;height:1px;
  background:rgba(37,168,37,0.2);
}
.or-divider span{
  font-size:12px;color:#2a5a2a;letter-spacing:2px;font-weight:700;
}

/* ── FOOTER ── */
.footer{
  font-size:12px;color:#1a3a1a;letter-spacing:1px;
  margin-top:6px;
}
.footer span{color:#2ecc71;font-weight:700;}
</style>
</head>
<body>
<div class="wrap">

  <!-- Logo -->
  <div class="logo-area">
    <img class="logo-img" src="loho.jpg" alt="MCS Logo"/>
    <span class="school-name">THE MUSLIM COLLEGIATE SCHOOL</span>
  </div>

  <!-- Title -->
  <div class="game-title">QUIZ BATTLE</div>
  <p class="tagline">Cultivating Minds, Creating Change — Since 2022</p>

  <!-- Cards -->
  <div class="cards">

    <!-- Spectator / Admin -->
    <a class="choice-card gold-card" href="quizAdmin.html">
      <div class="card-icon">📺</div>
      <div class="card-text">
        <div class="card-title">SPECTATOR</div>
        <div class="card-desc">Watch the battle live — leaderboard &amp; winner screen</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <div class="or-divider"><span>OR</span></div>

    <!-- Player -->
    <a class="choice-card" href="quizPlayer.html">
      <div class="card-icon">📱</div>
      <div class="card-text">
        <div class="card-title">PLAYER</div>
        <div class="card-desc">Join the quiz — enter your room ID and compete!</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

  </div>

  <div class="footer">Developed by <span>M. Idrees</span></div>
</div>
</body>
</html>
