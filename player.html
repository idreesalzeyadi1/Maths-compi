<script>
// ===== DEBUG =====
function log(msg, color = '#0f0') {
  console.log(msg);

  const p = document.getElementById('debugPanel');
  p.classList.add('visible');

  const line = document.createElement('div');
  line.style.color = color;
  line.textContent =
    new Date().toLocaleTimeString() + ' → ' + msg;

  p.appendChild(line);
  p.scrollTop = p.scrollHeight;
}

// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  databaseURL:
    "https://maths-compi-default-rtdb.asia-southeast1.firebasedatabase.app"
};

// ===== FIREBASE INIT =====
let firebaseReady = false;

try {

  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }

  firebaseReady = true;

  log('Firebase Connected ✅');

} catch (e) {

  log(
    'Firebase Init Failed: ' + e.message,
    '#f44336'
  );

}

const db = firebase.database();

// ===== GLOBAL STATE =====
let currentRoom = '';
let currentPlayer = '';
let currentTeam = '1';

// ===== STATUS MESSAGE =====
function showStatus(message, type = 'error') {

  const status =
    document.getElementById('statusMsg');

  status.style.display = 'block';
  status.innerText = message;

  status.className =
    type === 'error'
      ? 'error-msg'
      : 'success-msg';
}

// ===== JOIN GAME =====
function joinGame() {

  log('JOIN button clicked');

  // Inputs
  const roomId =
    document
      .getElementById('roomInput')
      .value
      .trim()
      .toUpperCase();

  const playerName =
    document
      .getElementById('nameInput')
      .value
      .trim();

  const team =
    document
      .getElementById('teamSelect')
      .value;

  // Validation
  if (!roomId) {

    showStatus(
      '❌ Enter Room ID'
    );

    return;
  }

  if (!playerName) {

    showStatus(
      '❌ Enter Your Name'
    );

    return;
  }

  if (!firebaseReady) {

    showStatus(
      '❌ Firebase not connected'
    );

    return;
  }

  currentRoom = roomId;
  currentPlayer = playerName;
  currentTeam = team;

  log('Checking room: ' + roomId);

  // ===== CHECK ROOM =====
  db.ref('rooms/' + roomId)
    .once('value')

    .then(snapshot => {

      if (!snapshot.exists()) {

        log(
          'Room NOT FOUND ❌',
          '#f44336'
        );

        showStatus(
          '❌ Room Not Found'
        );

        throw new Error('Room not found');
      }

      log('Room Found ✅');

      // ===== CREATE PLAYER =====
      const playerId =
        'player_' + Date.now();

      const playerData = {
        id: playerId,
        name: playerName,
        team: team,
        joinedAt: Date.now(),
        online: true
      };

      return db
        .ref(
          'rooms/' +
          roomId +
          '/players/' +
          playerId
        )
        .set(playerData);

    })

    .then(() => {

      log(
        'Player Joined Successfully ✅'
      );

      showStatus(
        '✅ Joined Successfully',
        'success'
      );

      // ===== SHOW WAITING SCREEN =====
      document
        .getElementById('joinScreen')
        .style.display = 'none';

      document
        .getElementById('waitingScreen')
        .style.display = 'flex';

      document
        .getElementById('waitRoomInfo')
        .innerHTML =
        `
        Room: <b>${currentRoom}</b><br>
        Team:
        <b>
        ${
          currentTeam === '1'
            ? '💙 BLUE'
            : '❤️ RED'
        }
        </b>
        `;

      listenForGameStart();

    })

    .catch(error => {

      log(
        'Error: ' + error.message,
        '#f44336'
      );

    });

}

// ===== LISTEN FOR GAME START =====
function listenForGameStart() {

  log('Waiting for game start...');

  db.ref(
    'rooms/' +
    currentRoom +
    '/gameStarted'
  )

  .on('value', snapshot => {

    const started = snapshot.val();

    if (started === true) {

      log('GAME STARTED 🚀');

      document
        .getElementById('waitingScreen')
        .style.display = 'none';

      document
        .getElementById('gameScreen')
        .style.display = 'flex';

      // Team UI
      const teamBar =
        document.getElementById('teamBar');

      if (currentTeam === '1') {

        teamBar.innerHTML =
          '💙 TEAM BLUE';

        teamBar.className =
          'team-bar blue';

      } else {

        teamBar.innerHTML =
          '❤️ TEAM RED';

        teamBar.className =
          'team-bar red';

      }

      listenForQuestions();

    }

  });

}

// ===== QUESTION LISTENER =====
function listenForQuestions() {

  db.ref(
    'rooms/' +
    currentRoom +
    '/currentQuestion'
  )

  .on('value', snapshot => {

    const data = snapshot.val();

    if (!data) return;

    log('New Question Loaded');

    document
      .getElementById('questionText')
      .innerText =
      data.question || '—';

  });

}

// ===== ANSWER INPUT =====
let currentAnswer = '';

function pressKey(num) {

  if (currentAnswer.length >= 8)
    return;

  currentAnswer += num;

  updateAnswerDisplay();
}

function deleteLast() {

  currentAnswer =
    currentAnswer.slice(0, -1);

  updateAnswerDisplay();
}

function updateAnswerDisplay() {

  const display =
    document.getElementById(
      'answerDisplay'
    );

  display.innerText =
    currentAnswer || '_';

  if (currentAnswer) {

    display.classList.add('has-val');

  } else {

    display.classList.remove('has-val');

  }

}

// ===== SUBMIT ANSWER =====
function submitAnswer() {

  if (!currentAnswer) return;

  log(
    'Submitting Answer: ' +
    currentAnswer
  );

  const answerData = {
    player: currentPlayer,
    team: currentTeam,
    answer: currentAnswer,
    time: Date.now()
  };

  db.ref(
    'rooms/' +
    currentRoom +
    '/answers'
  )

  .push(answerData)

  .then(() => {

    showCorrect();

    currentAnswer = '';
    updateAnswerDisplay();

  })

  .catch(err => {

    log(
      'Submit Failed: ' +
      err.message,
      '#f44336'
    );

  });

}

// ===== FEEDBACK =====
function showCorrect() {

  const overlay =
    document.getElementById(
      'correctOverlay'
    );

  overlay.style.display = 'flex';

  setTimeout(() => {

    overlay.style.display = 'none';

  }, 1000);

}

function showWrong() {

  const overlay =
    document.getElementById(
      'wrongOverlay'
    );

  overlay.style.display = 'flex';

  setTimeout(() => {

    overlay.style.display = 'none';

  }, 1000);

}

// ===== ENTER KEY SUPPORT =====
document
  .getElementById('roomInput')
  .addEventListener('keypress', e => {

    if (e.key === 'Enter')
      joinGame();

  });

document
  .getElementById('nameInput')
  .addEventListener('keypress', e => {

    if (e.key === 'Enter')
      joinGame();

  });

log('Player App Loaded 🚀');
</script>
