<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Compi - Player</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: Arial, sans-serif;
            background: #0f0f1e; color: white; text-align: center;
        }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        #joinScreen { display: flex; }
        input, select, button {
            margin: 10px; padding: 12px 20px; font-size: 18px; border-radius: 8px; border: none;
        }
        input, select { width: 280px; }
        button {
            background: #00ff88; color: black; font-weight: bold; cursor: pointer;
        }
        .error-msg { color: #ff4444; margin: 10px; font-weight: bold; }
        .success-msg { color: #00ff88; margin: 10px; font-weight: bold; }

        #debugPanel {
            position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.85);
            padding: 10px; border-radius: 8px; max-height: 250px; overflow-y: auto;
            font-size: 13px; display: none; text-align: left; z-index: 9999; width: 380px;
        }
    </style>
</head>
<body>

    <!-- JOIN SCREEN -->
    <div id="joinScreen" class="screen">
        <h1>🪢 Tug of War</h1>
        <h2>Join Room</h2>
        
        <input type="text" id="roomInput" placeholder="Room ID (e.g. ABC123)" maxlength="10" style="text-transform:uppercase">
        <input type="text" id="nameInput" placeholder="Your Name">
        
        <select id="teamSelect">
            <option value="1">Team Blue 💙</option>
            <option value="2">Team Red ❤️</option>
        </select>
        
        <button onclick="joinGame()">JOIN GAME</button>
        <div id="statusMsg"></div>
    </div>

    <!-- WAITING SCREEN -->
    <div id="waitingScreen" class="screen">
        <h2>Waiting for Game to Start...</h2>
        <div id="waitRoomInfo" style="margin: 20px; font-size: 20px;"></div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen">
        <div id="teamBar" style="padding: 12px; font-size: 26px; font-weight: bold; width: 100%;"></div>
        <h2 id="questionText" style="margin: 30px; min-height: 100px;">Waiting for question...</h2>
        
        <div style="margin: 20px;">
            <div id="answerDisplay" style="font-size: 52px; letter-spacing: 10px; min-height: 80px; border-bottom: 4px solid #00ff88;">
                _
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 320px; margin: 20px auto;">
            <button onclick="pressKey('1')">1</button>
            <button onclick="pressKey('2')">2</button>
            <button onclick="pressKey('3')">3</button>
            <button onclick="pressKey('4')">4</button>
            <button onclick="pressKey('5')">5</button>
            <button onclick="pressKey('6')">6</button>
            <button onclick="pressKey('7')">7</button>
            <button onclick="pressKey('8')">8</button>
            <button onclick="pressKey('9')">9</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="pressKey('0')">0</button>
            <button onclick="submitAnswer()" style="background:#00ff88; font-weight:bold;">SUBMIT</button>
        </div>
    </div>

    <div id="debugPanel"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        let db, firebaseReady = false;
        let currentRoom = '', currentPlayer = '', currentTeam = '1', currentAnswer = '';

        function log(msg, color = '#0f0') {
            console.log(msg);
            const panel = document.getElementById('debugPanel');
            panel.style.display = 'block';
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            panel.appendChild(line);
            panel.scrollTop = panel.scrollHeight;
        }

        function initFirebase() {
            const firebaseConfig = {
                apiKey: "AIzaSyA8HVAmKLpv6YshzqN6boiLjDJ3MEDov3Y",
                authDomain: "maths-compi.firebaseapp.com",
                databaseURL: "https://maths-compi-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "maths-compi",
                storageBucket: "maths-compi.firebasestorage.app",
                messagingSenderId: "570914604597",
                appId: "1:570914604597:web:96df45271bc58ef29d137c"
            };

            try {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                firebaseReady = true;
                log('Firebase Connected ✅', '#00ff88');
            } catch (e) {
                log('Firebase Error: ' + e.message, '#ff4444');
            }
        }

        function showStatus(msg, type = 'error') {
            const el = document.getElementById('statusMsg');
            el.innerHTML = msg;
            el.style.color = type === 'success' ? '#00ff88' : '#ff4444';
        }

        // ================== JOIN GAME ==================
        function joinGame() {
            if (!firebaseReady) return showStatus('❌ Firebase not ready. Refresh karo.');

            const roomId = document.getElementById('roomInput').value.trim().toUpperCase();
            const playerName = document.getElementById('nameInput').value.trim() || "Player";
            const team = document.getElementById('teamSelect').value;

            if (!roomId) return showStatus('❌ Room ID enter karo');
            if (!playerName) return showStatus('❌ Naam enter karo');

            currentRoom = roomId;
            currentPlayer = playerName;
            currentTeam = team;

            log(`Trying to join room: ${roomId}`);

            const roomRef = db.ref('rooms/' + roomId);

            roomRef.once('value')
                .then(snapshot => {
                    if (!snapshot.exists()) throw new Error("Room not found");

                    const playerId = 'p_' + Date.now();
                    const playerData = {
                        name: playerName,
                        team: team,
                        joinedAt: Date.now()
                    };

                    // Important: Match spectator structure
                    return roomRef.child('teams').child(team === '1' ? 't1players' : 't2players').child(playerId).set(playerData);
                })
                .then(() => {
                    log('Joined Successfully!', '#00ff88');
                    showStatus('✅ Joined Successfully!', 'success');

                    document.getElementById('joinScreen').style.display = 'none';
                    document.getElementById('waitingScreen').style.display = 'flex';
                    document.getElementById('waitRoomInfo').innerHTML = `
                        Room: <b>${roomId}</b><br>
                        Team: <b>${team === '1' ? '💙 BLUE' : '❤️ RED'}</b>
                    `;

                    listenForGameStart();
                })
                .catch(err => {
                    console.error(err);
                    showStatus('❌ ' + err.message);
                    log('Join Failed: ' + err.message, '#ff4444');
                });
        }

        function listenForGameStart() {
            db.ref('rooms/' + currentRoom + '/phase').on('value', snap => {
                if (snap.val() === 'playing') {
                    log('Game Started!', '#00ff88');
                    document.getElementById('waitingScreen').style.display = 'none';
                    document.getElementById('gameScreen').style.display = 'flex';
                    listenForQuestions();
                }
            });
        }

        function listenForQuestions() {
            db.ref('rooms/' + currentRoom + '/round').on('value', snap => {
                const roundData = snap.val();
                if (roundData && roundData.q1 && roundData.q2) {
                    const question = currentTeam === '1' ? roundData.q1.text : roundData.q2.text;
                    document.getElementById('questionText').innerText = question;
                    currentAnswer = '';
                    updateAnswerDisplay();
                }
            });
        }

        function pressKey(num) {
            if (currentAnswer.length >= 8) return;
            currentAnswer += num;
            updateAnswerDisplay();
        }

        function deleteLast() {
            currentAnswer = currentAnswer.slice(0, -1);
            updateAnswerDisplay();
        }

        function updateAnswerDisplay() {
            document.getElementById('answerDisplay').innerText = currentAnswer || '_';
        }

        function submitAnswer() {
            if (!currentAnswer) return;

            const teamKey = currentTeam === '1' ? 't1' : 't2';
            const isCorrect = false; // Will be checked on spectator side

            db.ref('rooms/' + currentRoom + '/answers').child(teamKey).set({
                answer: currentAnswer,
                player: currentPlayer,
                time: Date.now(),
                correct: isCorrect
            });

            currentAnswer = '';
            updateAnswerDisplay();
        }

        // Initialize
        window.onload = () => {
            initFirebase();
            log('Player App Loaded 🚀');
        };
    </script>
</body>
</html>
