<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🪢 Tug of War — Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap');
  :root { --blue:#1a73e8; --red:#e53935; --gold:#FFD600; --bg:#0d0d2b; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Nunito',sans-serif; background:var(--bg); color:#fff; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

  #joinScreen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:20px; padding:24px; width:100%; max-width:420px; background:radial-gradient(ellipse at 50% 0%,#1a1a4e 0%,#0d0d2b 70%); }
  .title { font-family:'Bangers',cursive; font-size:48px; letter-spacing:4px; background:linear-gradient(135deg,#FFD600,#ff6f00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; }
  .card { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:28px 24px; width:100%; display:flex; flex-direction:column; gap:14px; }
  .card h2 { font-family:'Bangers',cursive; font-size:24px; letter-spacing:2px; color:var(--gold); text-align:center; }
  label { font-size:13px; color:#aaa; margin-bottom:3px; display:block; }
  input, select { width:100%; padding:14px 16px; border-radius:14px; border:2px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.07); color:#fff; font-size:20px; font-family:'Nunito',sans-serif; font-weight:700; outline:none; text-align:center; letter-spacing:4px; transition:border-color 0.2s; }
  input:focus { border-color:var(--gold); }
  input.name-input { letter-spacing:0; font-size:18px; text-align:left; }
  select { letter-spacing:0; text-align:center; }
  select option { background:#1a1a4e; }
  .btn { padding:16px; border-radius:16px; border:none; font-family:'Bangers',cursive; font-size:24px; letter-spacing:2px; cursor:pointer; width:100%; transition:transform 0.1s; }
  .btn:active { transform:scale(0.96); }
  .btn-gold { background:linear-gradient(135deg,#FFD600,#ff8f00); color:#0d0d2b; box-shadow:0 6px 24px rgba(255,214,0,0.3); }
  .error-msg { background:rgba(229,57,53,0.2); border:1px solid var(--red); border-radius:10px; padding:10px 14px; font-size:14px; color:#ef9a9a; text-align:center; }

  #waitingScreen { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:20px; padding:24px; text-align:center; }
  .spinner { width:60px; height:60px; border:5px solid rgba(255,255,255,0.1); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  #gameScreen { display:none; flex-direction:column; align-items:center; width:100%; min-height:100vh; }
  .team-bar { width:100%; padding:14px 20px; text-align:center; font-family:'Bangers',cursive; font-size:22px; letter-spacing:3px; }
  .team-bar.blue { background:linear-gradient(135deg,#1a73e8,#0d47a1); }
  .team-bar.red { background:linear-gradient(135deg,#e53935,#b71c1c); }

  .timer-ring-wrap { margin-top:20px; position:relative; width:90px; height:90px; }
  .timer-svg { width:90px; height:90px; transform:rotate(-90deg); }
  .timer-bg { fill:none; stroke:rgba(255,255,255,0.1); stroke-width:6; }
  .timer-arc { fill:none; stroke:var(--gold); stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-num { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Bangers',cursive; font-size:32px; color:var(--gold); }

  .round-label { font-size:14px; color:#888; letter-spacing:2px; text-transform:uppercase; margin-top:12px; }

  .question-box { margin:20px; background:rgba(255,255,255,0.07); border:2px solid rgba(255,255,255,0.15); border-radius:20px; padding:28px 24px; text-align:center; width:calc(100% - 40px); max-width:380px; }
  .question-box .q-label { font-size:13px; color:#888; letter-spacing:2px; margin-bottom:12px; }
  .question-big { font-family:'Bangers',cursive; font-size:clamp(42px,14vw,72px); letter-spacing:2px; color:#fff; }

  .keypad-wrap { width:100%; max-width:380px; padding:0 20px 20px; display:flex; flex-direction:column; gap:12px; }
  .answer-display { background:rgba(255,255,255,0.07); border:2px solid rgba(255,255,255,0.2); border-radius:16px; padding:14px 20px; text-align:center; font-family:'Bangers',cursive; font-size:40px; letter-spacing:4px; min-height:72px; color:#fff; display:flex; align-items:center; justify-content:center; }
  .answer-display.has-val { border-color:var(--gold); }
  .answer-display.correct { border-color:#4caf50; background:rgba(76,175,80,0.15); color:#4caf50; }
  .answer-display.wrong { border-color:#f44336; background:rgba(244,67,54,0.15); color:#f44336; }

  .keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .key { aspect-ratio:1; border-radius:14px; border:2px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.07); color:#fff; font-family:'Bangers',cursive; font-size:28px; cursor:pointer; transition:transform 0.08s,background 0.1s; display:flex; align-items:center; justify-content:center; user-select:none; }
  .key:active { transform:scale(0.9); background:rgba(255,255,255,0.15); }

  .submit-btn { padding:18px; border-radius:16px; border:none; font-family:'Bangers',cursive; font-size:28px; letter-spacing:2px; cursor:pointer; width:100%; color:#0d0d2b; transition:transform 0.08s; }
  .submit-btn:active { transform:scale(0.97); }
  .submit-btn { background:linear-gradient(135deg,#FFD600,#ff8f00); }
  .submit-btn:disabled { background:#333; color:#666; cursor:not-allowed; }

  #nextRoundMsg { display:none; text-align:center; padding:20px; font-size:18px; color:#aaa; }

  .feedback-overlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:16px; font-family:'Bangers',cursive; font-size:80px; z-index:50; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); }
  .feedback-overlay p { font-size:28px; letter-spacing:2px; }
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="joinScreen">
  <div class="title">🪢 TUG OF WAR</div>
  <div style="font-size:15px;color:#888;text-align:center">Room ID daal ke apni team join karo!</div>
  <div class="card">
    <h2>🎮 JOIN GAME</h2>
    <div>
      <label>Room ID (Projector screen se dekho)</label>
      <input type="text" id="roomInput" placeholder="ABC123" maxlength="6" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
    </div>
    <div>
      <label>Apna Naam</label>
      <input type="text" id="nameInput" class="name-input" placeholder="e.g. Ahmed" maxlength="20">
    </div>
    <div>
      <label>Apni Team</label>
      <select id="teamSelect">
        <option value="1">💙 Team 1 (Blue)</option>
        <option value="2">❤️ Team 2 (Red)</option>
      </select>
    </div>
    <div id="joinError" style="display:none" class="error-msg"></div>
    <button class="btn btn-gold" onclick="joinGame()">⚡ JOIN GAME</button>
  </div>
</div>

<!-- WAITING -->
<div id="waitingScreen">
  <div class="spinner"></div>
  <div style="font-family:'Bangers',cursive;font-size:28px;color:var(--gold)" id="waitTitle">JOINED! ✅</div>
  <div style="color:#888" id="waitMsg">Teacher ke START MATCH ka wait karo...</div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen">
  <div class="team-bar blue" id="teamBar">💙 TEAM BLUE</div>
  <div class="timer-ring-wrap">
    <svg class="timer-svg" viewBox="0 0 90 90">
      <circle class="timer-bg" cx="45" cy="45" r="39"/>
      <circle class="timer-arc" id="timerArc" cx="45" cy="45" r="39" stroke-dasharray="245" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-num" id="timerNum">15</div>
  </div>
  <div class="round-label" id="roundLabel">ROUND 1</div>
  <div class="question-box">
    <div class="q-label">SOLVE THIS:</div>
    <div class="question-big" id="questionText">—</div>
  </div>
  <div class="keypad-wrap">
    <div class="answer-display" id="answerDisplay">_</div>
    <div class="keypad">
      <div class="key" onclick="pressKey('1')">1</div>
      <div class="key" onclick="pressKey('2')">2</div>
      <div class="key" onclick="pressKey('3')">3</div>
      <div class="key" onclick="pressKey('4')">4</div>
      <div class="key" onclick="pressKey('5')">5</div>
      <div class="key" onclick="pressKey('6')">6</div>
      <div class="key" onclick="pressKey('7')">7</div>
      <div class="key" onclick="pressKey('8')">8</div>
      <div class="key" onclick="pressKey('9')">9</div>
      <div class="key" onclick="pressKey('0')">0</div>
      <div class="key" onclick="deleteLast()">⌫</div>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitAnswer()">✅ SUBMIT ANSWER</button>
    <div id="nextRoundMsg">⏳ Next round ka wait karo...</div>
  </div>
</div>

<!-- Feedback -->
<div class="feedback-overlay" id="correctOverlay" style="color:#4caf50">✅<p>BILKUL SAHI!</p></div>
<div class="feedback-overlay" id="wrongOverlay" style="color:#f44336">❌<p>GALAT!</p></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const FIREBASE_URL = 'https://maths-compi-default-rtdb.asia-southeast1.firebaseio.com';
firebase.initializeApp({ databaseURL: FIREBASE_URL });
const db = firebase.database();

let player = {
  roomId: '', name: '', team: 1, teamColor: 'blue',
  currentAnswer: '', correctAns: null, submitted: false,
  currentRound: 0, questionTime: 15,
};

let timerInterval = null;
let roomRef = null;
let roundRef = null;
let lastRoundTs = 0;

// ===== JOIN GAME =====
async function joinGame() {
  const roomId = document.getElementById('roomInput').value.trim().toUpperCase();
  const name = document.getElementById('nameInput').value.trim();
  const team = parseInt(document.getElementById('teamSelect').value);

  if (!roomId || roomId.length < 4) { showError('Valid Room ID dalein!'); return; }
  if (!name) { showError('Apna naam dalein!'); return; }

  showError('');
  document.querySelector('.btn-gold').textContent = '🔄 Joining...';
  document.querySelector('.btn-gold').disabled = true;

  try {
    // Check if room exists in Firebase
    const snap = await db.ref('rooms/' + roomId + '/config').get();

    if (!snap.exists()) {
      showError('Room nahi mila! Room ID check karein.');
      document.querySelector('.btn-gold').textContent = '⚡ JOIN GAME';
      document.querySelector('.btn-gold').disabled = false;
      return;
    }

    const config = snap.val();
    player.roomId = roomId;
    player.name = name;
    player.team = team;
    player.teamColor = team === 1 ? 'blue' : 'red';
    player.questionTime = config.questionTime || 15;
    roomRef = db.ref('rooms/' + roomId);

    // Register this player in Firebase
    const teamKey = team === 1 ? 't1' : 't2';
    const playerKey = team === 1 ? 't1players' : 't2players';
    await roomRef.child('teams/' + teamKey).set(true);
    await roomRef.child('teams/' + playerKey + '/' + name.replace(/[.#$\/\[\]]/g,'')).set(name);

    // Update team bar name from config
    const teamName = team === 1 ? config.team1 : config.team2;
    document.getElementById('teamBar').textContent = (team===1?'💙 ':'❤️ ') + teamName.toUpperCase();
    document.getElementById('teamBar').className = 'team-bar ' + player.teamColor;

    // Switch to waiting screen
    document.getElementById('joinScreen').style.display = 'none';
    document.getElementById('waitingScreen').style.display = 'flex';
    document.getElementById('waitTitle').textContent = 'JOINED! ✅';
    document.getElementById('waitMsg').textContent = 'Teacher ke START MATCH ka wait karo...';

    // Listen for new round (game start signal)
    roomRef.child('round').on('value', snap => {
      const data = snap.val();
      if (!data) return;
      if (data.ts === lastRoundTs) return; // same round ignore
      lastRoundTs = data.ts;
      loadRound(data);
    });

  } catch(e) {
    showError('Error: ' + e.message);
    document.querySelector('.btn-gold').textContent = '⚡ JOIN GAME';
    document.querySelector('.btn-gold').disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('joinError');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// ===== LOAD ROUND =====
function loadRound(data) {
  const qKey = player.team === 1 ? 'q1' : 'q2';
  const q = data[qKey];
  if (!q) return;

  player.correctAns = q.ans;
  player.submitted = false;
  player.currentAnswer = '';
  player.currentRound = data.round;

  // Show game screen
  document.getElementById('waitingScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';

  document.getElementById('roundLabel').textContent = 'ROUND ' + data.round;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('answerDisplay').textContent = '_';
  document.getElementById('answerDisplay').className = 'answer-display';

  const btn = document.getElementById('submitBtn');
  btn.disabled = false;
  btn.textContent = '✅ SUBMIT ANSWER';
  btn.style.background = 'linear-gradient(135deg,#FFD600,#ff8f00)';

  document.getElementById('nextRoundMsg').style.display = 'none';
  document.querySelectorAll('.key').forEach(k => k.style.pointerEvents = '');

  startTimer(data.time || player.questionTime);
}

// ===== TIMER =====
function startTimer(seconds) {
  clearInterval(timerInterval);
  let remaining = seconds;
  const arc = document.getElementById('timerArc');
  const numEl = document.getElementById('timerNum');
  const circumference = 245;

  function update() {
    numEl.textContent = remaining;
    arc.style.strokeDashoffset = circumference * (1 - remaining/seconds);
    if (remaining <= 5) { arc.style.stroke='#f44336'; numEl.style.color='#f44336'; }
    else { arc.style.stroke='var(--gold)'; numEl.style.color='var(--gold)'; }
  }
  update();

  timerInterval = setInterval(() => {
    remaining--;
    update();
    if (remaining <= 0) { clearInterval(timerInterval); if(!player.submitted) autoSubmit(); }
  }, 1000);
}

// ===== KEYPAD =====
function pressKey(digit) {
  if (player.submitted || player.currentAnswer.length >= 6) return;
  player.currentAnswer += digit;
  updateDisplay();
}
function deleteLast() {
  if (player.submitted) return;
  player.currentAnswer = player.currentAnswer.slice(0,-1);
  updateDisplay();
}
function updateDisplay() {
  const el = document.getElementById('answerDisplay');
  el.textContent = player.currentAnswer || '_';
  el.className = 'answer-display' + (player.currentAnswer ? ' has-val' : '');
}

// ===== SUBMIT =====
function submitAnswer() {
  if (player.submitted || !player.currentAnswer) return;
  clearInterval(timerInterval);
  player.submitted = true;
  const userAns = parseInt(player.currentAnswer);
  const correct = userAns === player.correctAns;
  sendToFirebase(correct, userAns);
  showFeedback(correct);
}

function autoSubmit() {
  player.submitted = true;
  const userAns = player.currentAnswer ? parseInt(player.currentAnswer) : null;
  const correct = userAns !== null && userAns === player.correctAns;
  sendToFirebase(correct, userAns);
  showFeedback(correct);
}

async function sendToFirebase(correct, value) {
  const teamKey = player.team === 1 ? 't1' : 't2';
  await roomRef.child('answers/' + teamKey).set({
    team: player.team,
    name: player.name,
    value: value,
    correct: correct,
    round: player.currentRound,
    ts: Date.now(),
  });
}

function showFeedback(correct) {
  const ansEl = document.getElementById('answerDisplay');
  const btn = document.getElementById('submitBtn');

  if (correct) {
    ansEl.className = 'answer-display correct';
    ansEl.textContent = '✅ ' + player.currentAnswer;
    btn.textContent = '✅ SAHI!';
    btn.style.background = '#4caf50';
    document.getElementById('correctOverlay').style.display = 'flex';
    setTimeout(() => { document.getElementById('correctOverlay').style.display = 'none'; }, 1500);
  } else {
    ansEl.className = 'answer-display wrong';
    ansEl.textContent = '❌ ' + (player.currentAnswer || '?');
    btn.textContent = '❌ GALAT';
    btn.style.background = '#f44336';
    document.getElementById('wrongOverlay').style.display = 'flex';
    setTimeout(() => { document.getElementById('wrongOverlay').style.display = 'none'; }, 1500);
  }

  btn.disabled = true;
  document.querySelectorAll('.key').forEach(k => k.style.pointerEvents = 'none');
  document.getElementById('nextRoundMsg').style.display = 'block';
}
</script>
</body>
</html>
