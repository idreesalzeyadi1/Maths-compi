<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Muslim Collegiate School</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a1f0a;
    font-family: 'Nunito', sans-serif;
    color: #e8f5e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(50,180,50,0.13) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(20,80,20,0.18) 0%, transparent 60%);
  }

  .page {
    width: 100%;
    max-width: 860px;
    padding: 3rem 1.5rem 2.5rem;
    text-align: center;
  }

  /* ── HEADER ── */
  .logo-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: #fff;
    border: 4px solid #2ecc71;
    box-shadow: 0 0 24px rgba(46,204,113,0.5), 0 0 60px rgba(46,204,113,0.15);
    margin-bottom: 1rem;
    overflow: hidden;
    animation: popIn 0.5s ease both;
  }

  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .school-name {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #2ecc71;
    margin-bottom: 0.4rem;
    animation: fadeUp 0.5s 0.1s ease both;
  }

  .main-title {
    font-family: 'Bangers', cursive;
    font-size: 72px;
    letter-spacing: 6px;
    color: #f5c518;
    text-shadow: 3px 3px 0px #8a6a00, 0 0 30px rgba(245,197,24,0.3);
    line-height: 1;
    margin-bottom: 0.4rem;
    animation: fadeUp 0.5s 0.15s ease both;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 4px;
    color: #4a7a4a;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.5s 0.2s ease both;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 2.5rem;
  }

  .card {
    background: rgba(10, 40, 10, 0.85);
    border: 1.5px solid #1a5c1a;
    border-radius: 12px;
    padding: 1.4rem 1rem 1.2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .card:nth-child(1) { animation-delay: 0.25s; }
  .card:nth-child(2) { animation-delay: 0.32s; }
  .card:nth-child(3) { animation-delay: 0.39s; }
  .card:nth-child(4) { animation-delay: 0.46s; }
  .card:nth-child(5) { animation-delay: 0.53s; }
  .card:nth-child(6) { animation-delay: 0.60s; }

  .card.active {
    border-color: #2ecc71;
    cursor: pointer;
    text-decoration: none;
    display: block;
    box-shadow: 0 0 16px rgba(46,204,113,0.2), inset 0 0 30px rgba(46,204,113,0.04);
  }

  .card.active::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #2ecc71, transparent);
  }

  .card.active:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 28px rgba(46,204,113,0.35), inset 0 0 30px rgba(46,204,113,0.07);
    border-color: #57e88a;
  }

  .card.coming {
    opacity: 0.45;
  }

  .card-logo {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid #1a5c1a;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 0.85rem;
    overflow: hidden;
  }

  .card.active .card-logo {
    border-color: #2ecc71;
    box-shadow: 0 0 10px rgba(46,204,113,0.3);
  }

  .card-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .card-title {
    font-family: 'Bangers', cursive;
    font-size: 20px;
    letter-spacing: 2px;
    color: #f5c518;
    margin-bottom: 6px;
  }

  .card.coming .card-title {
    color: #3a6a3a;
  }

  .card-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 20px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .badge-play {
    background: rgba(46,204,113,0.15);
    color: #2ecc71;
    border: 1px solid rgba(46,204,113,0.4);
  }

  .badge-soon {
    background: rgba(255,255,255,0.03);
    color: #2a4a2a;
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* ── FOOTER ── */
  .footer {
    border-top: 1px solid #1a3a1a;
    padding-top: 1.4rem;
    animation: fadeUp 0.5s 0.65s ease both;
  }

  .social-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 0.85rem;
  }

  .social-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid #1a5c1a;
    background: rgba(10,40,10,0.6);
    color: #4aaa4a;
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  .social-btn:hover {
    color: #2ecc71;
    border-color: #2ecc71;
    background: rgba(46,204,113,0.08);
  }

  .social-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  .dev-credit {
    font-size: 12px;
    color: #2a5a2a;
    letter-spacing: 1px;
  }

  .dev-credit span { color: #2ecc71; font-weight: 700; }

  /* ── ANIMATIONS ── */
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .main-title { font-size: 52px; }
  }
</style>
</head>
<body>

</html>
