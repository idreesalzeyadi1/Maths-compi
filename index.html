<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪢 Tug of War — Math Battle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Nunito',sans-serif;
    background:#0d0d2b;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:32px;
    padding:24px;
    background:radial-gradient(ellipse at 50% 0%,#1a1a4e 0%,#0d0d2b 70%);
  }
  .title {
    font-family:'Bangers',cursive;
    font-size:clamp(40px,10vw,80px);
    letter-spacing:4px;
    text-align:center;
    background:linear-gradient(135deg,#FFD600,#ff6f00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 30px rgba(255,214,0,0.4));
  }
  .subtitle {
    font-size:16px;
    color:#888;
    text-align:center;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-top:-20px;
  }
  .cards {
    display:flex;
    flex-direction:column;
    gap:16px;
    width:100%;
    max-width:420px;
  }
  .card {
    display:flex;
    align-items:center;
    gap:20px;
    padding:24px 28px;
    border-radius:20px;
    text-decoration:none;
    color:#fff;
    transition:transform 0.15s, box-shadow 0.2s;
    cursor:pointer;
  }
  .card:active { transform:scale(0.97); }
  .card.spectator {
    background:linear-gradient(135deg,rgba(255,214,0,0.15),rgba(255,143,0,0.1));
    border:2px solid rgba(255,214,0,0.4);
  }
  .card.spectator:hover { box-shadow:0 8px 32px rgba(255,214,0,0.25); transform:translateY(-2px); }
  .card.player {
    background:linear-gradient(135deg,rgba(26,115,232,0.2),rgba(229,57,53,0.15));
    border:2px solid rgba(100,181,246,0.3);
  }
  .card.player:hover { box-shadow:0 8px 32px rgba(26,115,232,0.25); transform:translateY(-2px); }
  .card-icon { font-size:48px; flex-shrink:0; }
  .card-text {}
  .card-title {
    font-family:'Bangers',cursive;
    font-size:26px;
    letter-spacing:2px;
    margin-bottom:4px;
  }
  .card.spectator .card-title { color:#FFD600; }
  .card.player .card-title { color:#64b5f6; }
  .card-desc { font-size:13px; color:#aaa; line-height:1.5; }
  .divider {
    display:flex;
    align-items:center;
    gap:12px;
    color:#444;
    font-size:13px;
    width:100%;
    max-width:420px;
  }
  .divider::before, .divider::after {
    content:'';
    flex:1;
    height:1px;
    background:#333;
  }
</style>
</head>
<body>
  <div class="title">🪢 TUG OF WAR</div>
  <div class="subtitle">Mathematics Battle</div>

  <div class="cards">
    <a class="card spectator" href="spectator.html">
      <div class="card-icon">📺</div>
      <div class="card-text">
        <div class="card-title">SPECTATOR / TEACHER</div>
        <div class="card-desc">Projector pe open karo — room banao, dono teams ka wait karo, phir match shuru karo</div>
      </div>
    </a>

    <div class="divider">ya</div>

    <a class="card player" href="player.html">
      <div class="card-icon">📱</div>
      <div class="card-text">
        <div class="card-title">STUDENT / PLAYER</div>
        <div class="card-desc">Phone pe open karo — Room ID daal ke apni team join karo aur math solve karo!</div>
      </div>
    </a>
  </div>
</body>
</html>
